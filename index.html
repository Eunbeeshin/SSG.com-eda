<head>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #ff5452;
            --secondary: #2d3436;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --accent: #00cec9;
            --gradient: linear-gradient(135deg, #ff5452 0%, #ff7675 100%);
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: var(--gradient);
            color: white;
            padding: 2rem 5%;
            box-shadow: 0 4px 15px rgba(255, 84, 82, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 5%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            margin: 0;
            color: #636e72;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 0.5rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .chart-container h2 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .table-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            overflow-x: auto;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            background: #f1f2f6;
            font-weight: 600;
            color: #2d3436;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #f1f2f6;
        }

        tr:hover {
            background-color: #fafafa;
        }

        .item-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-ad {
            background: #dfe6e9;
            color: #636e72;
        }

        .badge-sale {
            background: #ff7675;
            color: white;
        }

        .price {
            font-weight: 600;
            color: #2d3436;
        }

        .discount {
            color: var(--primary);
            font-weight: 700;
        }

        input[type="text"] {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #dfe6e9;
            width: 300px;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            input[type="text"] {
                width: 100%;
            }
        }
    </style>
</head>

            });

            // 광고 차트
            const adCtx = document.getElementById('adChart').getContext('2d');
            new Chart(adCtx, {
                type: 'pie',
                data: {
                    labels: ['일반', '광고'],
                    datasets: [{
                        data: [400, 7],
                        backgroundColor: ['#dfe6e9', '#ff7675']
                    }]
                }
            });
        }

        // 테이블 렌더링
        function renderTable(items) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td><img src="${item.imgUrl}" class="item-img" onerror="this.src='https://via.placeholder.com/50'"></td>
                    <td>${item.brandNm || '-'}</td>
                    <td><a href="${item.itemLnk}" target="_blank" style="text-decoration:none; color:inherit;">${item.itemNm}</a></td>
                    <td class="price">${Number(item.displayPrc).toLocaleString()}원</td>
                    <td class="discount">${item.discountRate}%</td>
                    <td><span class="badge ${item.advertYn === 'Y' ? 'badge-sale' : 'badge-ad'}">${item.advertYn === 'Y' ? 'AD' : '-'}</span></td>
                </tr>
            `).join('');
        }

        // 필터링 기능
        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = data.filter(item =>
                (item.itemNm && item.itemNm.toLowerCase().includes(query)) ||
                (item.brandNm && item.brandNm.toLowerCase().includes(query))
            );
            renderTable(filtered);
        }

        window.onload = () => {
            initCharts();
            renderTable(data);
        };
    </script>
</body>

</html>
